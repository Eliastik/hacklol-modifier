<VirtualHost *:80>
  DocumentRoot /var/www/hacklol-modifier
  ServerSignature Off

  <Directory /var/www/hacklol-modifier>
    Options FollowSymLinks
    DirectoryIndex index.php index.html
    AllowOverride All
    Require all granted
  </Directory>
</VirtualHost>

<IfDefine SSL>
  <VirtualHost *:443>
    DocumentRoot /var/www/hacklol-modifier
    ServerSignature Off
    SSLEngine On
    SSLCertificateFile /etc/apache2/ssl/apache.pem
    SSLCertificateKeyFile /etc/apache2/ssl/apache.key

    <Directory /var/www/hacklol-modifier>
      Options FollowSymLinks
      DirectoryIndex index.php index.html
      AllowOverride All
      Require all granted
    </Directory>
  </VirtualHost>
</IfDefine>